_notes": ""}, {"audit_id": "rpt_audit_023", "language_pair": "ar-en", "task_family": "script_register_locale", "user_prompt": "اكتب رد واتساب قصير بالعربية. حافظ على البيانات المذكورة في السياق كما هي تماماً. السياق: Confirm the meeting is on 05/07/2026 and ask them not to change the date format.", "assistant_response": "مرحباً، أرجو تأكيد أن الاجتماع سيكون في 05/07/2026، ويرجى عدم تغيير تنسيق التاريخ. شكراً!", "expected_response_language": "Arabic", "expected_script": "Arabic", "must_preserve_spans": "[\"05/07/2026\"]", "register_requirement": "short polite casual message", "locale_requirement": "preserve literal dates, codes, names, filenames, and amounts exactly", "known_bad_outputs": "[\"wrong script\", \"changes literal data\", \"English-only response\"]", "notes_for_annotators": "Literal data must be unchanged even if the surrounding language changes.", "annotator_id": "", "human_pass": "", "human_language_pass": "", "human_script_pass": "", "human_preservation_pass": "", "human_task_pass": "", "human_register_locale_pass": "", "human_failure_types": "", "human_notes": ""}, {"audit_id": "rpt_audit_024", "language_pair": "ar-en", "task_family": "script_register_locale", "user_prompt": "اكتب رد واتساب قصير بالعربية. حافظ على البيانات المذكورة في السياق كما هي تماماً. السياق: Ask the bank to keep account label Travel_Fund exactly as written.", "assistant_response": "رجاءً، يرجى الحفاظ على تسمية الحساب \"Travel_Fund\" كما هي مكتوبة تمامًا.", "expected_response_language": "Arabic", "expected_script": "Arabic", "must_preserve_spans": "[\"Travel_Fund\"]", "register_requirement": "short polite casual message", "locale_requirement": "preserve literal dates, codes, names, filenames, and amounts exactly", "known_bad_outputs": "[\"wrong script\", \"changes literal data\", \"English-only response\"]", "notes_for_annotators": "Literal data must be unchanged even if the surrounding language changes.", "annotator_id": "", "human_pass": "", "human_language_pass": "", "human_script_pass": "", "human_preservation_pass": "", "human_task_pass": "", "human_register_locale_pass": "", "human_failure_types": "", "human_notes": ""}]</script>
  <script>
    const rows = JSON.parse(document.getElementById('audit-data').textContent);
    const exportFields = ["audit_id", "language_pair", "task_family", "user_prompt", "assistant_response", "expected_response_language", "expected_script", "must_preserve_spans", "register_requirement", "locale_requirement", "known_bad_outputs", "notes_for_annotators", "annotator_id", "human_pass", "human_language_pass", "human_script_pass", "human_preservation_pass", "human_task_pass", "human_register_locale_pass", "human_failure_types", "human_notes"];
    const annotationFields = ["annotator_id", "human_pass", "human_language_pass", "human_script_pass", "human_preservation_pass", "human_task_pass", "human_register_locale_pass", "human_failure_types", "human_notes"];
    const boolFields = annotationFields.filter((field) => field.startsWith('human_') && field.endsWith('_pass'));

    function optionHtml() {
      return '<option value=""></option><option value="TRUE">TRUE</option><option value="FALSE">FALSE</option>';
    }

    function escapeText(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function fieldId(row, field) {
      return `${row.audit_id}__${field}`;
    }

    function renderRows() {
      const container = document.getElementById('rows');
      container.innerHTML = rows.map((row) => {
        const constraints = [
          `Expected language: ${row.expected_response_language}`,
          `Expected script: ${row.expected_script}`,
          `Preserve exactly: ${row.must_preserve_spans || '[]'}`,
          `Known bad outputs: ${row.known_bad_outputs || '[]'}`,
          `Register: ${row.register_requirement || ''}`,
          `Locale: ${row.locale_requirement || ''}`,
          `Notes: ${row.notes_for_annotators || ''}`,
        ].join('\n');
        const boolInputs = boolFields.map((field) => `
          <div>
            <label for="${fieldId(row, field)}">${field.replaceAll('_', ' ')}</label>
            <select id="${fieldId(row, field)}" data-audit-id="${row.audit_id}" data-field="${field}">${optionHtml()}</select>
          </div>
        `).join('');
        return `
          <article class="row">
            <div class="row-head">
              <strong>${escapeText(row.audit_id)}</strong>
              <span>
                <span class="pill">${escapeText(row.language_pair)}</span>
                <span class="pill">${escapeText(row.task_family)}</span>
              </span>
            </div>
            <div class="text-grid">
              <div>
                <label>User prompt</label>
                <div class="prompt">${escapeText(row.user_prompt)}</div>
              </div>
              <div>
                <label>Assistant response</label>
                <div class="response">${escapeText(row.assistant_response)}</div>
              </div>
            </div>
            <div class="constraints">${escapeText(constraints)}</div>
            <div class="field-grid">
              ${boolInputs}
              <div class="wide">
                <label for="${fieldId(row, 'human_failure_types')}">human failure types</label>
                <input id="${fieldId(row, 'human_failure_types')}" data-audit-id="${row.audit_id}" data-field="human_failure_types" placeholder="comma-separated, blank if pass">
              </div>
              <div class="wide">
                <label for="${fieldId(row, 'human_notes')}">human notes</label>
                <textarea id="${fieldId(row, 'human_notes')}" data-audit-id="${row.audit_id}" data-field="human_notes"></textarea>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      if (/[",\n\r]/.test(text)) {
        return `"${text.replaceAll('"', '""')}"`;
      }
      return text;
    }

    function collectRows() {
      const annotatorId = document.getElementById('annotator_id').value.trim();
      return rows.map((row) => {
        const out = {};
        for (const field of exportFields) {
          out[field] = row[field] ?? '';
        }
        out.annotator_id = annotatorId;
        for (const field of annotationFields) {
          if (field === 'annotator_id') continue;
          const element = document.getElementById(fieldId(row, field));
          out[field] = element ? element.value : '';
        }
        return out;
      });
    }

    function downloadCsv() {
      const completed = collectRows();
      const lines = [exportFields.join(',')];
      for (const row of completed) {
        lines.push(exportFields.map((field) => csvEscape(row[field])).join(','));
      }
      const blob = new Blob([lines.join('\n') + '\n'], {type: 'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'human_audit_packet_v0.2_ar-en_completed.csv';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    renderRows();
    document.getElementById('export_button').addEventListener('click', downloadCsv);
  </script>
